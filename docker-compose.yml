services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    ports:
      - "2181:2181"
    # cp-zookeeper (UBI/minimal) muitas vezes não tem `nc`; bash + /dev/tcp costuma existir.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/2181'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  message_broker:
    image: confluentinc/cp-kafka:7.6.1
    container_name: message_broker
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # external (host)
      - "29092:29092" # internal (docker network)
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      # Listeners:
      # - INTERNAL: for other containers via message_broker:29092
      # - EXTERNAL: for host via localhost:9092 (debug)
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://message_broker:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 1>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: "secret-cookie"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    depends_on:
      - message_broker
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "message_broker:29092"
      JVM_OPTS: "-Xms32M -Xmx64M"
    restart: always

  api_service:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api_service
    depends_on:
      mongodb:
        condition: service_healthy
      message_broker:
        condition: service_healthy
    environment:
      HTTP_ADDR: "0.0.0.0:8080"
      MONGO_URI: "mongodb://mongodb:27017"
      MONGO_DB: "orders_db"
      KAFKA_BROKERS: "message_broker:29092"
      KAFKA_TOPIC: "order_events"
    ports:
      - "8080:8080"

  worker_service:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      mongodb:
        condition: service_healthy
      message_broker:
        condition: service_healthy
    environment:
      MONGO_URI: "mongodb://mongodb:27017"
      MONGO_DB: "orders_db"
      KAFKA_BROKERS: "message_broker:29092"
      KAFKA_TOPIC: "order_events"
      KAFKA_GROUP_ID: "orders-worker"

  email_service:
    build:
      context: .
      dockerfile: Dockerfile.email
    container_name: email_service
    depends_on:
      message_broker:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "message_broker:29092"
      KAFKA_TOPIC: "order_events"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RABBITMQ_QUEUE: "email_queue"

volumes:
  mongo_data:
  rabbitmq_data:

